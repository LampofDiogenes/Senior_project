<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Web Gnome - Saved Scrapes</title>
    <link rel="stylesheet" href="style/nav_bar.css">
    <link rel="stylesheet" href="style/saved_scrapes.css">
  </head>

  <body 
    onload="makeUI(
        'UI/scrapes', 
        document.getElementById('data_table')
      )"
  >
    <!-- header -->
    <div id="nav_bar"></div>

    <header> <b> Websites Currently Scraped: </b></header>


    <!-- on load, send the information to this div -->
    <table id="data_table">
      <tr>
        <td> Number </td>
        <td> Website Name </td>
        <td> Scrape Frequncy </td>
        <td> Date of Last Scrape </td>
        <td> Date of Next Scrape </td>
      </tr>
    </table>

  </body>
  
  <!-- builds nav bar -->
  <script src="./scripts/fetch_navigation.js"></script>

  <!-- displays all file names in a sepcifc folder -->
  <script src="./scripts/saved_scrapes.js"></script>

</html>
