<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Web Gnome - Saved Scrapes</title>
    <link rel="stylesheet" href="style/nav_bar.css">
    <link rel="stylesheet" href="style/saved_scrapes.css">
  </head>

  <body>
    <!-- header -->
    <div id="nav_bar"></div>

    <!-- on load, send the information to this div -->
    <table id="data_table">
      <tr>
        <td class="top-table"> Number </td>
        <td class="top-table"> Product </td>
        <td class="top-table"> Date of Last Scrape </td>
        <td class="top-table"> Date of Next Scrape </td>
        <td class="top-table"> URL </td>
        <td class="top-table"> Status (has the website changed?)</td>
      </tr>
    </table>

    <!-- builds nav bar -->
    <script src="./scripts/fetch_navigation.js"></script>

    <!-- displays all file names in a specific folder -->
    <script src="./scripts/saved_scrapes.js"></script>
  </body>
</html>
