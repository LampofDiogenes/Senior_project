<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Web Gnome - Saved Scrapes</title>
    <link rel="stylesheet" href="style/nav_bar.css">
  </head>

  <body>
    <!-- header -->
    <div id="nav_bar"></div>

    <!-- on click, run the scrape program -->
    <button 
      type="button" 
      id="buttonExecute" 
      onclick="makeUI('UI/scrapes', 'insert_target')">
      How many files are in the scrapes folder?
    </button>
    <div id="insert_target"></div>

  </body>
  
  <!-- builds nav bar -->
  <script src="./scripts/fetch_navigation.js"></script>

  <!-- currently counts how many files are in a certain folder -->
  <!-- Inserts buttons for each of the scrapes -->
  <script src="./scripts/display_scrapes.js"></script>

</html>
