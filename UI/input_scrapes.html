<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Web Gnome - Input Scrapes</title>
    <link rel="stylesheet" href="style/nav_bar.css">
  </head>

  <body>
    <!-- header -->
    <div id="nav_bar"></div>

    <!-- Content -->
    <div>
        <p>Target URL : 
          <input type="text" id="target_url">
        </p>
        <p>Scrape Frequency : 
          <select id="scrape_frequency">
            <option value="daily"> Daily </option>
            <option value="weekly"> Weekly </option>
            <option value="monthly"> Monthly </option>
          </select>
        </p>

        <!-- on click, run the scrape program -->
        <button 
          type="button" 
          id="buttonExecute" 
          onclick="fetch_html_code(target_url.value, scrape_frequency.value)">
          Scrape
        </button>

        <p> Hobart Brothers</p>
        <p id="products"> https://www.hobartbrothers.com/products/?_paged= </p>
        <button 
          id="buttonExecute" 
          onclick="hobart_brothers(products.value, number_of_pages.value)">
          Jacob Script
        </button>
          
    </div>
    <!-- scraping  -->
    <script src="./scripts/fetch_html_code.js"></script> 

    <!-- builds the nav bar -->
    <script src="./scripts/fetch_navigation.js"></script>

    <!-- Jacob's Script -->
    <script src="./scripts/jacob_script.js"></script>

    <!-- testing date -->
     <script src="./scripts/determine_date.js"></script>
  </body>
</html>
