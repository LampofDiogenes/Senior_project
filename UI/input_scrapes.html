<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Web Gnome - Input Scrapes</title>
    <link rel="stylesheet" href="style/nav_bar.css">
  </head>

  <body>
    <!-- header -->
    <div id="nav_bar"></div>

    <!-- Content -->
    <div>
        <p>Target URL : 
          <input type="text" id="target_url">
        </p>
        <p>Scrape Frequency : 
          <select id="scrape_frequency">
            <option value="daily"> Daily </option>
            <option value="weekly"> Weekly </option>
            <option value="monthly"> Monthly </option>
          </select>
        </p>

        <!-- on click, run the scrape program -->
        <p id="products">  </p>
        <button 
          id="buttonExecute" 
          onclick="hobart_brothers('loading_page', 'product_page_number', 'product_number_loaded')">
          Scrape Website
        </button>

        <p> Send Email </p>
        <!-- <p id="from" value="web-gnome-support@protonmail.com">  </p>
        <p id="to" value="wannabdiogenes@gmail.com">  </p>
        <p id="subject" value="Sending from Web Gnome">  </p>
        <p id="text" value="If you are seeing this, it has worked!"> </p> -->

        <select id="from">    <option value="web-gnome-support@protonmail.com"> from web-gnome</option> </select>
        <select id="to">      <option value="wannabdiogenes@gmail.com"> to (me) </option></select>
        <select id="subject"> <option value="Sending from Web Gnome"> subject </option></select>
        <select id="text">    <option value="If you are seeing this, it has worked!"> text </option></select>
        <button
        onclick="recordData(
          document.getElementById('from').value, 
          document.getElementById('to').value,
          document.getElementById('subject').value,
          document.getElementById('text').value
          )"> Send Mail</button>

        <p id="loading_page"></p>
        <p id="product_page_number"></p>
        <p id="product_number_loaded"></p>
          
    </div>

    <!-- builds the nav bar -->
    <script src="./scripts/fetch_navigation.js"></script>

    <!-- scrapes websites -->
    <script src="./scripts/input_scrapes.js"></script>

    <!-- sends emails -->
    <script src="./scripts/send_email.js"></script>
  </body>
</html>
