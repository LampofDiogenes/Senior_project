<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Web Gnome - Input Scrapes</title>
    <link rel="stylesheet" href="style/nav_bar.css">
  </head>

  <body>
    <!-- header -->
    <div id="nav_bar"></div>

    <!-- Content -->
    <div>
        <p>Target URL (default is hobartbrothers): 
          <input type="text" id="target_url" value="https://www.hobartbrothers.com">
        </p>

        <p> Pages to focus on:
          <input type="text" id="page_focus" value="https://www.hobartbrothers.com/product/product-details">
        </p>

        <!-- on click, run the scrape program -->
        <p id="products">  </p>
        <button 
          id="buttonExecute" 
          onclick="spider_search(target_url.value, page_focus.value, 'loading_page', 'product_page_number', 'product_number_loaded')">
          Scrape Website
        </button>

        <p id="loading_page"></p>
        <p id="product_page_number"></p>
        <p id="product_number_loaded"></p>

        <button
          onclick="where_am_i()" 
        >
          Where am I?
        </button>
          
    </div>

    <!-- builds the nav bar -->
    <script src="./scripts/fetch_navigation.js"></script>

    <!-- scrapes websites -->
    <script src="./scripts/input_scrapes2.js"></script>

    <!-- finding where the path currently is for testing -->
    <script src="./scripts/where_am_i.js"></script>

  </body>
</html>
