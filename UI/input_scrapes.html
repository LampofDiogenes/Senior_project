<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Web Gnome - Input Scrapes</title>
    <link rel="stylesheet" href="style/nav_bar.css">
  </head>

  <body>
    <!-- header -->
    <div id="nav_bar"></div>

    <!-- Content -->
    <div>
        <p>Target URL : </p>
        <input type="text" id="target_url">

        <!-- on button click : wired in renderers/input_scrapes.js -->

        <!-- Shows syntax for referencing external javascript -->

        <button 
          type="button" 
          id="buttonExecute" 
          onclick="fetch_html_code(target_url.value)">
          Scrape
        </button>

    </div>
    <script src="./scripts/fetch_html_code.js"></script>
    <script src="./scripts/fetch_navigation.js"></script>
    <script src="./renderers/input_scrapes.js"></script>
  </body>
</html>
