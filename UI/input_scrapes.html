<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Web Gnome - Input Scrapes</title>
    <link rel="stylesheet" href="style/nav_bar.css">
  </head>

  <body>
    <!-- header -->
    <div id="nav_bar"></div>

    <!-- Content -->
    <div>
        <p>Target URL (default is hobartbrothers): 
          <input type="text" id="target_url">
        </p>

        <!-- on click, run the scrape program -->
        <p id="products">  </p>
        <button 
          id="buttonExecute" 
          onclick="hobart_brothers(target_url.value, 'loading_page', 'product_page_number', 'product_number_loaded')">
          Scrape Website
        </button>

        <p id="loading_page"></p>
        <p id="product_page_number"></p>
        <p id="product_number_loaded"></p>
          
    </div>

    <!-- builds the nav bar -->
    <script src="./scripts/fetch_navigation.js"></script>

    <!-- scrapes websites -->
    <script src="./scripts/input_scrapes.js"></script>

  </body>
</html>
